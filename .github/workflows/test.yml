name: Pytest

on:
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Takumi Guard PyPI
        uses: flatt-security/setup-takumi-guard-pypi@7d825811bb293b9e0230477165442580a0074280 # v1.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@53e731ad7c31cb9d92e2db63b62737f50e934544 # v6.4.1
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Run tests
        run: uv run pytest --maxfail=1 --disable-warnings -q
