name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (e.g. v0.6.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write          # create GitHub Release
  packages: write          # push to GHCR
  id-token: write          # keyless cosign
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-+].*)?$ ]]; then
            echo "Invalid version: $tag"
            echo "Expected semver like v0.4.0 (optionally with -rc.1, +meta)"
            exit 1
          fi

          prerelease=false
          if [[ "$tag" == *"-rc."* || "$tag" == *"-beta"* || "$tag" == *"-alpha"* ]]; then
            prerelease=true
          fi

          stable=false
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable=true
          fi

          version="${tag#v}"
          base_version="${version%%[-+]*}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch release tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"

          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag does not exist on origin: ${tag}"
            exit 1
          fi

          object_type="$(git for-each-ref --format='%(objecttype)' "refs/tags/${tag}")"
          if [[ "$object_type" != "tag" ]]; then
            echo "Release tags must be annotated/signed tags. Found object type: ${object_type}"
            exit 1
          fi

          pkg_version="$(
            git show "${tag}:pyproject.toml" | python3 -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          )"
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            if [[ "$pkg_version" != "${{ steps.meta.outputs.base_version }}" ]]; then
              echo "For prerelease tags, pyproject.toml version (${pkg_version}) must match base version ${{ steps.meta.outputs.base_version }} derived from ${tag}"
              exit 1
            fi
          elif [[ "$pkg_version" != "${{ steps.meta.outputs.version }}" ]]; then
            echo "pyproject.toml version (${pkg_version}) does not match tag ${tag}"
            exit 1
          fi

          commit_sha="$(git rev-parse "${tag}^{}")"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout tagged commit
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${{ steps.validate.outputs.commit_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tmp tag
        id: tmp
        shell: bash
        run: |
          set -euo pipefail
          short="${{ steps.validate.outputs.commit_sha }}"
          short="${short:0:12}"
          echo "tag=tmp-${short}" >> "$GITHUB_OUTPUT"

      - name: Build & push tmp image
        id: push_tmp
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tmp.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.validate.outputs.commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Cosign sign (keyless)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.push_tmp.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Signing ${IMAGE}@${DIGEST}"
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Tag digest as release version
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.push_tmp.outputs.digest }}
          VERSION: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "${IMAGE}:${VERSION}" "${IMAGE}@${DIGEST}"

      - name: Tag stable release as :latest (post-sign)
        if: ${{ steps.meta.outputs.stable == 'true' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.push_tmp.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}@${DIGEST}"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.2"

      - name: Build Python package (wheel)
        shell: bash
        run: |
          set -euo pipefail
          uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          draft: false
          files: |
            dist/*.whl
